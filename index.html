<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>浦江学堂积分系统</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial; padding: 20px; background: #f0f7ff; }
        button { background: #1e466e; color: white; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; margin: 5px; }
        table { width: 100%; border-collapse: collapse; background: white; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>
    <h1>📚 浦江学堂智浔班积分系统</h1>
    
    <button id="addBtn">➕ 添加学生</button>
    <button id="refreshBtn">🔄 刷新</button>
    
    <div id="studentList">加载中...</div>

    <script>
        const SUPABASE_URL = "https://qlpmfrzdmtxyunrlzhiw.supabase.co";
        const SUPABASE_KEY = "sb_publishable_iAood7Ru7-_Ffl5VQsDzXw_Y2IKkiJf";
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        async function loadStudents() {
            const { data, error } = await sb.from('students').select('*').order('id');
            if (error) {
                document.getElementById('studentList').innerHTML = '错误: ' + error.message;
                return;
            }
            if (!data || data.length === 0) {
                document.getElementById('studentList').innerHTML = '暂无学生';
                return;
            }
            let html = '<tr><thead><tr><th>姓名</th><th>学号</th><th>积分</th><th>操作</th></tr></thead><tbody>';
            for (let s of data) {
                html += `<tr>
                    <td>${s.name}</td>
                    <td>${s.student_id || ''}</td>
                    <td>${s.points} 分</td>
                    <td><button onclick="changePoint(${s.id}, ${s.points + 10})">+10</button>
                    <button onclick="changePoint(${s.id}, ${Math.max(0, s.points - 10)})">-10</button>
                    <button onclick="deleteStudent(${s.id})">删除</button>
                </td>
                </tr>`;
            }
            html += '</tbody></table>';
            document.getElementById('studentList').innerHTML = html;
        }
        
        async function changePoint(id, newPoints) {
            await sb.from('students').update({ points: newPoints }).eq('id', id);
            loadStudents();
        }
        
        async function deleteStudent(id) {
            if (confirm('确定删除？')) {
                await sb.from('students').delete().eq('id', id);
                loadStudents();
            }
        }
        
        async function addStudent() {
            let name = prompt('请输入学生姓名');
            if (!name) return;
            let sid = prompt('请输入学号', name);
            await sb.from('students').insert({ name: name, student_id: sid || name, points: 0 });
            loadStudents();
        }
        
        document.getElementById('addBtn').onclick = addStudent;
        document.getElementById('refreshBtn').onclick = loadStudents;
        
        loadStudents();
    </script>
</body>
</html>
