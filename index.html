<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>浦江学堂智浔班积分系统</title>
    <script src="https://imgcache.qq.com/qcloud/cloudbase-js-sdk/1.7.0/cloudbase.full.js"></script>
    <style>
        * { box-sizing: border-box; font-family: system-ui, 'Segoe UI', '微软雅黑', sans-serif; }
        body { background: #f0f7ff; margin: 0; padding: 20px; }
        .container { max-width: 1400px; margin: 0 auto; background: white; border-radius: 32px; padding: 24px; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1); }
        h1 { font-size: 1.8rem; margin: 0 0 5px 0; color: #1e466e; border-left: 6px solid #ffaa33; padding-left: 20px; }
        .sub { color: #5d6f88; margin-bottom: 25px; border-left: 6px solid #ffaa33; padding-left: 26px; font-size: 0.9rem; }
        .tab-bar { display: flex; gap: 12px; margin-bottom: 25px; border-bottom: 2px solid #e2e8f0; padding-bottom: 12px; }
        .tab-btn { background: none; border: none; padding: 10px 28px; font-size: 1rem; font-weight: 600; border-radius: 40px; cursor: pointer; color: #5d6f88; }
        .tab-btn.active { background: #1e466e; color: white; }
        .tab-pane { display: none; }
        .tab-pane.active-pane { display: block; }
        .btn { background: white; border: 1px solid #cbd5e1; padding: 8px 18px; border-radius: 40px; font-weight: 500; cursor: pointer; font-size: 0.9rem; margin: 3px; }
        .btn-primary { background: #1e466e; border-color: #1e466e; color: white; }
        .btn-success { background: #2b7a3e; border-color: #2b7a3e; color: white; }
        .btn-warning { background: #d97706; border-color: #d97706; color: white; }
        .rank-card { background: linear-gradient(135deg, #fff7e6, #fff0d6); border-radius: 24px; padding: 16px 24px; margin-bottom: 20px; }
        .rank-list { list-style: none; padding: 0; margin: 0; }
        .rank-list li { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #ffe0b5; }
        .table-wrapper { overflow-x: auto; margin-bottom: 20px; border-radius: 20px; border: 1px solid #e9edf2; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f0f2f6; }
        th { background: #eef3fc; color: #1e466e; }
        .score-cell { font-weight: 700; color: #1f6e43; font-size: 1.1rem; }
        .small-btn { padding: 4px 12px; border-radius: 40px; cursor: pointer; margin: 2px; border: none; }
        .small-add { background: #e0f2e9; color: #1f6e43; }
        .small-sub { background: #ffe6e5; color: #b91c1c; }
        .small-del { background: #fee2e2; color: #b91c1c; }
        .card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin: 20px 0; }
        .gift-card { background: #ffffff; border-radius: 24px; border: 1px solid #e2edf7; padding: 16px; text-align: center; }
        .gift-name { font-size: 1.2rem; font-weight: 700; margin-bottom: 6px; }
        .gift-cost { color: #d97706; font-weight: bold; margin: 6px 0; }
        .gift-stock { font-size: 0.85rem; color: #5b6e8c; margin-bottom: 8px; }
        .student-self-card { background: #f0f9ff; border-radius: 28px; padding: 30px; text-align: center; margin-bottom: 30px; }
        .self-input-group { display: flex; gap: 15px; justify-content: center; flex-wrap: wrap; margin: 20px 0; }
        .self-input-group input { padding: 12px 20px; border-radius: 60px; border: 1px solid #cbd5e1; width: 220px; font-size: 1rem; }
        .student-info { background: #e6f4ea; border-radius: 20px; padding: 12px; margin: 15px 0; font-weight: bold; }
        .log-list { background: #f8fafc; border-radius: 20px; padding: 12px; max-height: 280px; overflow-y: auto; }
        .log-item { border-bottom: 1px solid #e2e8f0; padding: 8px 0; font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
        input, select, textarea { padding: 10px 14px; border-radius: 60px; border: 1px solid #cad2db; width: 100%; margin: 8px 0; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal-card { background: white; border-radius: 32px; padding: 24px; max-width: 450px; width: 90%; }
        .hidden { display: none; }
        .exchange-btn { background: #ffedd5; border: none; padding: 8px 0; width: 100%; border-radius: 60px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .delete-gift-btn { background: #fef2f2; border: none; padding: 8px 0; width: 100%; border-radius: 60px; cursor: pointer; color: #b91c1c; margin-top: 8px; }
        .del-log-refund { background: #e0f2e9; border: none; padding: 4px 12px; border-radius: 40px; cursor: pointer; color: #1f6e43; font-size: 0.7rem; margin-left: 5px; }
        .del-log-only { background: #fee2e2; border: none; padding: 4px 12px; border-radius: 40px; cursor: pointer; color: #b91c1c; font-size: 0.7rem; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
        .sync-badge { background: #2b7a3e; color: white; padding: 4px 12px; border-radius: 40px; font-size: 0.7rem; }
        .loading { text-align: center; padding: 40px; color: #666; }
        .error-msg { background: #fee2e2; color: #b91c1c; padding: 15px; border-radius: 20px; margin: 20px 0; }
    </style>
</head>
<body>
<div class="container">
    <div class="flex-between">
        <h1>📚 浦江学堂智浔班积分系统 <span class="sync-badge">☁️ 云端同步</span></h1>
        <button class="btn" id="exportExchangeLogBtn" style="background:#4a5568; color:white;">📋 导出兑换记录</button>
    </div>
    <div class="sub">👩‍🏫 教师管理端 | 🧑‍🎓 学生自助兑换 | 所有设备数据实时同步</div>

    <div class="tab-bar">
        <button class="tab-btn active" data-tab="teacher">教师管理后台</button>
        <button class="tab-btn" data-tab="student">学生自助兑换</button>
    </div>

    <div id="teacherPane" class="tab-pane active-pane">
        <div class="rank-card"><h3>🏆 积分排行榜</h3><ul class="rank-list" id="rankList">加载中...</ul></div>
        <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;">
            <button class="btn btn-primary" id="addStudentBtn">➕ 添加学生</button>
            <button class="btn btn-success" id="batchImportBtn">📦 批量导入学生</button>
            <button class="btn btn-primary" id="addGiftBtn">🎁 添加礼品</button>
            <button class="btn btn-warning" id="resetPointsBtn">⚠️ 重置全班积分</button>
            <button class="btn" id="exportDataBtn" style="background:#4a5568; color:white;">📋 导出全部数据(备份)</button>
            <button class="btn" id="importDataBtn" style="background:#e2e8f0;">📂 导入数据备份</button>
            <input type="file" id="importFile" accept=".json" style="display:none;">
        </div>
        <div class="table-wrapper"><table><thead><tr><th>姓名</th><th>学号</th><th>积分</th><th>操作</th></thead><tbody id="studentTableBody">加载中...</tbody></table></div>
        <div><h3>🎁 礼品管理</h3><div id="giftGrid" class="card-grid">加载中...</div></div>
        <details open>
            <summary style="cursor:pointer; font-weight:600;">📜 兑换记录（点击右侧按钮可删除/退还积分+库存）</summary>
            <div class="log-filter" style="margin: 15px 0;"><span>按学生筛选：</span><select id="filterStudentSelect"><option value="">全部学生</option></select></div>
            <div id="exchangeLogList" class="log-list">加载中...</div>
        </details>
    </div>

    <div id="studentPane" class="tab-pane">
        <div class="student-self-card"><h2>🎓 学生自助兑换</h2><p>请输入你的姓名和学号进行验证</p>
            <div class="self-input-group"><input type="text" id="studentNameInput" placeholder="学生姓名"><input type="text" id="studentIdInput" placeholder="学号"><button class="btn btn-primary" id="verifyStudentBtn">验证并进入</button></div>
            <div id="studentInfo" class="student-info" style="display:none;"></div>
        </div>
        <div id="studentGiftArea" style="display:none;"><h3>🎁 可兑换礼品</h3><div id="studentGiftGrid" class="card-grid"></div><h4>📋 我的兑换记录</h4><div id="studentOwnLogs" class="log-list"></div></div>
    </div>
</div>

<div id="studentModal" class="modal hidden"><div class="modal-card"><h3>添加学生</h3><input id="newStudentName" placeholder="姓名"><input id="newStudentId" placeholder="学号"><div style="display:flex;gap:12px;margin-top:20px;"><button class="btn btn-primary" id="confirmStudentBtn">确认</button><button class="btn" id="closeStudentModal">取消</button></div></div></div>
<div id="giftModal" class="modal hidden"><div class="modal-card"><h3>添加礼品</h3><input id="newGiftName" placeholder="礼品名称"><input id="newGiftCost" placeholder="所需积分" value="100"><input id="newGiftStock" placeholder="库存份数" value="5"><div style="display:flex;gap:12px;margin-top:20px;"><button class="btn btn-primary" id="confirmGiftBtn">确认</button><button class="btn" id="closeGiftModal">取消</button></div></div></div>
<div id="batchModal" class="modal hidden"><div class="modal-card"><h3>批量导入学生</h3><p>每行格式：<strong>姓名,学号</strong></p><textarea id="batchData" rows="6" placeholder="张三,001&#10;李四,002"></textarea><div style="display:flex;gap:12px;margin-top:20px;"><button class="btn btn-primary" id="confirmBatchBtn">确认导入</button><button class="btn" id="closeBatchModal">取消</button></div></div></div>

<script>
    // ==================== 腾讯云开发配置 ====================
    const ENV_ID = "class-points-d4gyd8p0t2e95fad1";
    // ===================================================

    // 全局状态
    let students = [];
    let gifts = [];
    let exchangeRecords = [];
    let currentStudent = null;
    let cloudReady = false;

    // ==================== 初始化云开发 ====================
    function initCloud() {
        try {
            if (typeof cloudbase === 'undefined') {
                console.error('❌ 腾讯云SDK未加载');
                return false;
            }
            const app = cloudbase.init({
                env: ENV_ID
            });
            window.db = app.database();
            cloudReady = true;
            console.log('✅ 腾讯云开发连接成功，环境ID:', ENV_ID);
            return true;
        } catch (e) {
            console.error('❌ 云开发初始化失败:', e);
            return false;
        }
    }

    // ==================== 数据库操作 ====================
    async function dbAdd(collection, data) {
        if (!cloudReady) throw new Error('云开发未就绪');
        return await window.db.collection(collection).add(data);
    }

    async function dbGetAll(collection) {
        if (!cloudReady) throw new Error('云开发未就绪');
        const res = await window.db.collection(collection).get();
        return res.data;
    }

    async function dbUpdate(collection, id, data) {
        if (!cloudReady) throw new Error('云开发未就绪');
        return await window.db.collection(collection).doc(id).update(data);
    }

    async function dbDelete(collection, id) {
        if (!cloudReady) throw new Error('云开发未就绪');
        return await window.db.collection(collection).doc(id).remove();
    }

    // ==================== 加载数据 ====================
    async function loadAllData() {
        if (!cloudReady) {
            document.getElementById('studentTableBody').innerHTML = '<tr><td colspan="4">❌ 连接云端失败，请检查网络</td></tr>';
            return;
        }
        try {
            const [s, g, r] = await Promise.all([
                dbGetAll('students'),
                dbGetAll('gifts'),
                dbGetAll('exchange_records')
            ]);
            students = s || [];
            gifts = g || [];
            exchangeRecords = r || [];
            
            // 如果没有数据，初始化
            if (students.length === 0 && gifts.length === 0) {
                await initDefaultData();
                return await loadAllData();
            }
            
            renderAll();
        } catch (e) {
            console.error('加载数据失败:', e);
        }
    }

    // 默认数据
    const DEFAULT_STUDENTS = [
        { name: "杜佳融", studentId: "1", points: 372 },
        { name: "郭宸羲", studentId: "2", points: 420 },
        { name: "张俊一", studentId: "3", points: 44 },
        { name: "叶昕垚", studentId: "4", points: 346 },
        { name: "施泽文", studentId: "5", points: 396 },
        { name: "沈桐彤", studentId: "6", points: 322 },
        { name: "黄仲楠", studentId: "7", points: 437 },
        { name: "金易杭", studentId: "8", points: 90 },
        { name: "郑玥", studentId: "9", points: 295 },
        { name: "陆佳瑜", studentId: "10", points: 299 },
        { name: "王悦涵", studentId: "11", points: 362 },
        { name: "周梦琪", studentId: "12", points: 330 },
        { name: "王诗涵", studentId: "13", points: 322 },
        { name: "孙晨纬", studentId: "14", points: 413 },
        { name: "许伟祺", studentId: "15", points: 291 },
        { name: "沈凡", studentId: "16", points: 390 },
        { name: "金张昱", studentId: "17", points: 369 },
        { name: "张诗悦", studentId: "18", points: 326 },
        { name: "朱奕名", studentId: "19", points: 341 },
        { name: "王子以恩", studentId: "20", points: 267 },
        { name: "杨如溪", studentId: "21", points: 431 },
        { name: "庄陆谊", studentId: "22", points: 474 },
        { name: "何禾言", studentId: "23", points: 366 },
        { name: "徐安澜", studentId: "24", points: 358 },
        { name: "杨子彧", studentId: "25", points: 394 },
        { name: "王雨菡", studentId: "26", points: 402 },
        { name: "廖芷恬", studentId: "27", points: 429 },
        { name: "沈哲勋", studentId: "28", points: 139 },
        { name: "姚艺歆", studentId: "29", points: 343 },
        { name: "谢俊宇", studentId: "30", points: 350 },
        { name: "张子洋", studentId: "31", points: 466 },
        { name: "施翊峰", studentId: "32", points: 423 },
        { name: "王铭泽", studentId: "33", points: 340 },
        { name: "谢雨潼", studentId: "34", points: 166 },
        { name: "王杨滢", studentId: "35", points: 481 }
    ];

    const DEFAULT_GIFTS = [
        { name: "免作业卡", cost: 120, stock: 10 },
        { name: "小零食组合", cost: 200, stock: 8 },
        { name: "班级表扬信", cost: 80, stock: 20 },
        { name: "自选同桌体验卡", cost: 300, stock: 5 }
    ];

    async function initDefaultData() {
        try {
            for (let s of DEFAULT_STUDENTS) {
                await dbAdd('students', s);
            }
            for (let g of DEFAULT_GIFTS) {
                await dbAdd('gifts', g);
            }
            console.log('✅ 默认数据初始化成功');
        } catch (e) {
            console.error('初始化失败:', e);
        }
    }

    // ==================== 渲染函数 ====================
    function escapeHtml(s) { if (!s) return ''; return String(s).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }

    function renderAll() {
        renderStudentTable();
        renderGiftList();
        renderRanking();
        renderExchangeLog();
        updateFilterSelect();
        if (currentStudent) renderStudentView();
    }

    function renderStudentTable() {
        const tbody = document.getElementById('studentTableBody');
        if (!students || !students.length) {
            tbody.innerHTML = '<tr><td colspan="4">暂无学生，请添加</td></tr>';
            return;
        }
        tbody.innerHTML = students.map(s => `<tr>
                <td>${escapeHtml(s.name)}</td>
                <td>${escapeHtml(s.studentId || '-')}</td>
                <td class="score-cell">${s.points} 分</td>
                <td>
                    <button class="small-btn small-add" onclick="changePoints('${s._id}', 'add')">➕加分</button>
                    <button class="small-btn small-sub" onclick="changePoints('${s._id}', 'sub')">➖减分</button>
                    <button class="small-btn small-del" onclick="deleteStudent('${s._id}')">🗑️删除</button>
                 </td>
             </tr>`).join('');
    }

    window.changePoints = async function(id, type) {
        const student = students.find(s => s._id === id);
        if (!student) return;
        let val = parseInt(prompt(`请输入要${type === 'add' ? '加' : '减'}的积分`, "10"));
        if (isNaN(val) || val <= 0) return alert("请输入正整数");
        const newPoints = type === 'add' ? student.points + val : Math.max(0, student.points - val);
        try {
            await dbUpdate('students', id, { points: newPoints });
            await loadAllData();
        } catch (e) { alert('操作失败'); }
    };

    window.deleteStudent = async function(id) {
        if (!confirm("确定删除？")) return;
        try {
            await dbDelete('students', id);
            await loadAllData();
        } catch (e) { alert('删除失败'); }
    };

    function renderGiftList() {
        const container = document.getElementById('giftGrid');
        if (!gifts || !gifts.length) {
            container.innerHTML = '<div>暂无礼品，请添加</div>';
            return;
        }
        container.innerHTML = gifts.map(g => `
            <div class="gift-card">
                <div class="gift-name">🎁 ${escapeHtml(g.name)}</div>
                <div class="gift-cost">💰 ${g.cost} 积分</div>
                <div class="gift-stock">📦 剩余 ${g.stock} 份</div>
                <button class="exchange-btn" onclick="teacherExchange('${g._id}')">兑换（教师）</button>
                <button class="delete-gift-btn" onclick="deleteGift('${g._id}')">删除</button>
            </div>
        `).join('');
    }

    window.teacherExchange = async function(giftId) {
        const gift = gifts.find(g => g._id === giftId);
        if (!gift || gift.stock <= 0) return alert("库存不足");
        const name = prompt("学生姓名");
        const student = students.find(s => s.name === name?.trim());
        if (!student) return alert("未找到");
        if (student.points < gift.cost) return alert(`积分不足`);
        try {
            await dbUpdate('students', student._id, { points: student.points - gift.cost });
            await dbUpdate('gifts', giftId, { stock: gift.stock - 1 });
            await dbAdd('exchange_records', {
                studentId: student._id,
                studentName: student.name,
                giftName: gift.name,
                giftId: giftId,
                cost: gift.cost,
                pointsAfter: student.points - gift.cost,
                date: new Date().toISOString()
            });
            await loadAllData();
            alert('兑换成功');
        } catch (e) { alert('兑换失败'); }
    };

    window.deleteGift = async function(id) {
        if (!confirm("删除？")) return;
        try { await dbDelete('gifts', id); await loadAllData(); } catch(e) { alert('删除失败'); }
    };

    window.deleteExchangeRecord = async function(index, refund) {
        const record = exchangeRecords[index];
        if (!record) return;
        if (!confirm(refund ? "删除并退还积分？" : "确定删除？")) return;
        try {
            if (refund) {
                const student = students.find(s => s._id === record.studentId);
                if (student) await dbUpdate('students', student._id, { points: student.points + record.cost });
                if (record.giftId) {
                    const gift = gifts.find(g => g._id === record.giftId);
                    if (gift) await dbUpdate('gifts', gift._id, { stock: gift.stock + 1 });
                }
            }
            await dbDelete('exchange_records', record._id);
            await loadAllData();
            alert('已删除');
        } catch(e) { alert('操作失败'); }
    };

    function renderExchangeLog() {
        const select = document.getElementById('filterStudentSelect');
        const filterId = select.value || null;
        let filtered = filterId ? exchangeRecords.filter(r => r.studentId === filterId) : exchangeRecords;
        const container = document.getElementById('exchangeLogList');
        if (!filtered || !filtered.length) {
            container.innerHTML = '暂无记录';
            return;
        }
        container.innerHTML = filtered.map((r, idx) => {
            const originalIndex = exchangeRecords.findIndex(er => er._id === r._id);
            return `
                <div class="log-item">
                    <span>📅 ${new Date(r.date).toLocaleString()} | ${escapeHtml(r.studentName)} 兑换【${escapeHtml(r.giftName)}】花费 ${r.cost} 分，剩余 ${r.pointsAfter} 分</span>
                    <span>
                        <button class="del-log-refund" onclick="deleteExchangeRecord(${originalIndex}, true)">🗑️ 删除并退还</button>
                        <button class="del-log-only" onclick="deleteExchangeRecord(${originalIndex}, false)">🗑️ 仅删除</button>
                    </span>
                </div>
            `;
        }).join('');
    }

    function updateFilterSelect() {
        const sel = document.getElementById('filterStudentSelect');
        if (!students || !students.length) {
            sel.innerHTML = '<option value="">全部学生</option>';
            return;
        }
        sel.innerHTML = '<option value="">全部学生</option>' + students.map(s => `<option value="${s._id}">${escapeHtml(s.name)}</option>`).join('');
    }

    function renderRanking() {
        const sorted = [...(students || [])].sort((a,b) => b.points - a.points).slice(0,5);
        const rankDiv = document.getElementById('rankList');
        if (!sorted || !sorted.length) {
            rankDiv.innerHTML = '<li>暂无学生</li>';
            return;
        }
        rankDiv.innerHTML = sorted.map((s,i) => `<li><span>${i+1}. ${escapeHtml(s.name)}</span> <strong>${s.points}</strong> 分</li>`).join('');
    }

    async function verifyStudent() {
        const name = document.getElementById('studentNameInput').value.trim();
        const sid = document.getElementById('studentIdInput').value.trim();
        const student = students.find(s => s.name === name && s.studentId === sid);
        if (!student) { alert("验证失败"); return; }
        currentStudent = student;
        document.getElementById('studentInfo').innerHTML = `✅ 欢迎，${escapeHtml(student.name)} | 当前积分: <strong>${student.points}</strong> 分`;
        document.getElementById('studentInfo').style.display = 'block';
        document.getElementById('studentGiftArea').style.display = 'block';
        renderStudentView();
    }

    function renderStudentView() {
        if (!currentStudent) return;
        const available = (gifts || []).filter(g => g.stock > 0);
        const container = document.getElementById('studentGiftGrid');
        if (!available || !available.length) {
            container.innerHTML = '<div>暂无礼品可兑换</div>';
        } else {
            container.innerHTML = available.map(g => `
                <div class="gift-card">
                    <div class="gift-name">🎁 ${escapeHtml(g.name)}</div>
                    <div class="gift-cost">💰 ${g.cost} 积分</div>
                    <div class="gift-stock">📦 剩余 ${g.stock} 份</div>
                    <button class="exchange-btn" onclick="studentExchange('${g._id}')">立即兑换</button>
                </div>
            `).join('');
        }
        const myLogs = exchangeRecords.filter(r => r.studentId === currentStudent._id);
        const logDiv = document.getElementById('studentOwnLogs');
        if (!myLogs || !myLogs.length) {
            logDiv.innerHTML = '暂无兑换记录';
        } else {
            logDiv.innerHTML = myLogs.map(r => `<div class="log-item">📅 ${new Date(r.date).toLocaleString()} 兑换【${escapeHtml(r.giftName)}】花费 ${r.cost} 分，剩余 ${r.pointsAfter} 分</div>`).join('');
        }
    }

    window.studentExchange = async function(giftId) {
        if (!currentStudent) return;
        const gift = gifts.find(g => g._id === giftId);
        if (!gift || gift.stock <= 0) return alert("库存不足");
        if (currentStudent.points < gift.cost) return alert(`积分不足`);
        try {
            await dbUpdate('students', currentStudent._id, { points: currentStudent.points - gift.cost });
            await dbUpdate('gifts', giftId, { stock: gift.stock - 1 });
            await dbAdd('exchange_records', {
                studentId: currentStudent._id,
                studentName: currentStudent.name,
                giftName: gift.name,
                giftId: giftId,
                cost: gift.cost,
                pointsAfter: currentStudent.points - gift.cost,
                date: new Date().toISOString()
            });
            await loadAllData();
            currentStudent = students.find(s => s._id === currentStudent._id);
            document.getElementById('studentInfo').innerHTML = `✅ 欢迎，${escapeHtml(currentStudent.name)} | 当前积分: <strong>${currentStudent.points}</strong> 分`;
            renderStudentView();
            alert('兑换成功！');
        } catch(e) { alert('兑换失败'); }
    };

    async function addStudent(name, sid) {
        if (!name.trim()) return alert("请输入姓名");
        try {
            await dbAdd('students', { name: name.trim(), studentId: sid.trim() || name, points: 0 });
            await loadAllData();
        } catch(e) { alert('添加失败'); }
    }

    async function batchAddStudents(text) {
        const lines = text.trim().split(/\r?\n/);
        let added = 0;
        try {
            for (let line of lines) {
                line = line.trim(); if (!line) continue;
                let [name, sid] = line.split(','); name = name?.trim();
                if (name) { await dbAdd('students', { name, studentId: sid?.trim() || name, points: 0 }); added++; }
            }
            await loadAllData();
            alert(`导入 ${added} 人`);
        } catch(e) { alert('导入失败'); }
    }

    async function addGift(n,c,s) {
        if (!n.trim()) return alert("请输入礼品名");
        try {
            await dbAdd('gifts', { name: n.trim(), cost: parseInt(c), stock: parseInt(s) });
            await loadAllData();
        } catch(e) { alert('添加失败'); }
    }

    async function resetAllPoints() {
        if (!confirm("重置全班积分？")) return;
        try {
            for (let s of students) await dbUpdate('students', s._id, { points: 0 });
            await loadAllData();
            alert("已重置");
        } catch(e) { alert('重置失败'); }
    }

    function exportFullBackup() {
        const data = { students, gifts, exchangeRecords };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `备份_${Date.now()}.json`; a.click();
    }

    function importBackup(file) {
        const reader = new FileReader();
        reader.onload = async e => {
            try {
                const data = JSON.parse(e.target.result);
                for (let s of students) await dbDelete('students', s._id).catch(()=>{});
                for (let g of gifts) await dbDelete('gifts', g._id).catch(()=>{});
                for (let r of exchangeRecords) await dbDelete('exchange_records', r._id).catch(()=>{});
                if (data.students) for (let s of data.students) await dbAdd('students', { name: s.name, studentId: s.studentId || s.student_id, points: s.points });
                if (data.gifts) for (let g of data.gifts) await dbAdd('gifts', { name: g.name, cost: g.cost, stock: g.stock });
                if (data.exchangeRecords) for (let r of data.exchangeRecords) await dbAdd('exchange_records', { studentId: r.studentId, studentName: r.studentName, giftName: r.giftName, giftId: r.giftId, cost: r.cost, pointsAfter: r.pointsAfter, date: r.date || new Date().toISOString() });
                await loadAllData();
                alert("导入成功");
            } catch(err) { alert("文件格式错误"); }
        };
        reader.readAsText(file);
    }

    function exportExchangeLog() {
        if (!exchangeRecords || !exchangeRecords.length) { alert("暂无记录"); return; }
        let csv = [["时间","学生","礼品","花费","剩余"]];
        for (let r of exchangeRecords) csv.push([new Date(r.date).toLocaleString(), r.studentName, r.giftName, r.cost, r.pointsAfter]);
        let content = csv.map(row => row.join(",")).join("\n");
        let blob = new Blob(["\uFEFF" + content], { type: "text/csv" });
        let a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `兑换记录_${Date.now()}.csv`; a.click();
    }

    // ==================== 事件绑定 ====================
    document.getElementById('addStudentBtn').onclick = () => document.getElementById('studentModal').classList.remove('hidden');
    document.getElementById('confirmStudentBtn').onclick = async () => {
        await addStudent(document.getElementById('newStudentName').value, document.getElementById('newStudentId').value);
        document.getElementById('studentModal').classList.add('hidden');
        document.getElementById('newStudentName').value = ''; document.getElementById('newStudentId').value = '';
    };
    document.getElementById('closeStudentModal').onclick = () => document.getElementById('studentModal').classList.add('hidden');
    document.getElementById('batchImportBtn').onclick = () => document.getElementById('batchModal').classList.remove('hidden');
    document.getElementById('closeBatchModal').onclick = () => document.getElementById('batchModal').classList.add('hidden');
    document.getElementById('confirmBatchBtn').onclick = async () => {
        await batchAddStudents(document.getElementById('batchData').value);
        document.getElementById('batchModal').classList.add('hidden');
        document.getElementById('batchData').value = '';
    };
    document.getElementById('addGiftBtn').onclick = () => document.getElementById('giftModal').classList.remove('hidden');
    document.getElementById('confirmGiftBtn').onclick = async () => {
        await addGift(document.getElementById('newGiftName').value, document.getElementById('newGiftCost').value, document.getElementById('newGiftStock').value);
        document.getElementById('giftModal').classList.add('hidden');
        document.getElementById('newGiftName').value = ''; document.getElementById('newGiftCost').value = '100'; document.getElementById('newGiftStock').value = '5';
    };
    document.getElementById('closeGiftModal').onclick = () => document.getElementById('giftModal').classList.add('hidden');
    document.getElementById('resetPointsBtn').onclick = resetAllPoints;
    document.getElementById('exportDataBtn').onclick = exportFullBackup;
    document.getElementById('importDataBtn').onclick = () => document.getElementById('importFile').click();
    document.getElementById('importFile').onchange = e => { if(e.target.files[0]) importBackup(e.target.files[0]); e.target.value = ''; };
    document.getElementById('verifyStudentBtn').onclick = verifyStudent;
    document.getElementById('filterStudentSelect').onchange = () => renderExchangeLog();
    document.getElementById('exportExchangeLogBtn').onclick = exportExchangeLog;

    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('teacherPane').classList.toggle('active-pane', btn.dataset.tab === 'teacher');
            document.getElementById('studentPane').classList.toggle('active-pane', btn.dataset.tab === 'student');
            if (btn.dataset.tab === 'student' && currentStudent) renderStudentView();
        };
    });

    // ==================== 启动 ====================
    function start() {
        const sdkLoaded = typeof cloudbase !== 'undefined';
        console.log('SDK加载状态:', sdkLoaded ? '✅ 已加载' : '❌ 未加载');
        console.log('环境ID:', ENV_ID);
        
        if (sdkLoaded) {
            const ok = initCloud();
            if (ok) {
                loadAllData();
            } else {
                document.getElementById('studentTableBody').innerHTML = '<tr><td colspan="4">❌ 云开发初始化失败，请检查环境ID</td></tr>';
                document.getElementById('giftGrid').innerHTML = '<div>❌ 云开发初始化失败</div>';
            }
        } else {
            document.getElementById('studentTableBody').innerHTML = '<tr><td colspan="4">❌ SDK加载失败，请检查网络</td></tr>';
            document.getElementById('giftGrid').innerHTML = '<div>❌ SDK加载失败</div>';
            document.getElementById('rankList').innerHTML = '<li>❌ SDK加载失败</li>';
        }
    }

    start();
</script>
